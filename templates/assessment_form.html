{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>New Assessment</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        /* Custom styling just for this massive form to make it look like a clipboard/grid */
        .assessment-container { max-width: 900px; margin: 40px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .grid-row { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .anatomy-section { flex: 1; min-width: 200px; background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid #ddd; }
        .anatomy-section h3 { margin-top: 0; font-size: 1.1em; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 5px; }
        .checkbox-group { display: flex; flex-direction: column; gap: 5px; }
        .notes-section { width: 100%; margin-top: 20px; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="assessment-container">
        <h2>Assessment Record</h2>
        
        <p><strong>Date:</strong> {% now "F j, Y" %}</p>

        <form id="assessmentForm" method="post">
            {% csrf_token %}
            
            <input type="hidden" name="assessment_data" id="json_payload">

            <div class="grid-row">
                
                <div class="anatomy-section">
                    <h3>Cervical Spine</h3>
                    <div class="checkbox-group">
                        <label><input type="checkbox" class="assessment-box" data-group="cervical" value="C1"> C1 (Atlas)</label>
                        <label><input type="checkbox" class="assessment-box" data-group="cervical" value="C2"> C2 (Axis)</label>
                        <label><input type="checkbox" class="assessment-box" data-group="cervical" value="C3"> C3</label>
                        <label><input type="checkbox" class="assessment-box" data-group="cervical" value="C4"> C4</label>
                        <label><input type="checkbox" class="assessment-box" data-group="cervical" value="C5"> C5</label>
                        <label><input type="checkbox" class="assessment-box" data-group="cervical" value="C6"> C6</label>
                        <label><input type="checkbox" class="assessment-box" data-group="cervical" value="C7"> C7</label>
                    </div>
                </div>

                <div class="anatomy-section">
                    <h3>Thoracic Spine</h3>
                    <div class="checkbox-group">
                        <label><input type="checkbox" class="assessment-box" data-group="thoracic" value="T1-T5"> T1 - T5</label>
                        <label><input type="checkbox" class="assessment-box" data-group="thoracic" value="T6-T12"> T6 - T12</label>
                        <label><input type="checkbox" class="assessment-box" data-group="thoracic" value="T13-T18"> T13 - T18</label>
                    </div>
                </div>

                </div>

            <div class="notes-section">
                <h3>General Notes</h3>
                <textarea name="general_notes" placeholder="Type overall findings here..."></textarea>
            </div>

            <button type="submit" style="margin-top: 20px; background: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 1.1em;">
                Save Assessment
            </button>
        </form>
    </div>

    <script>
        document.getElementById('assessmentForm').addEventListener('submit', function(event) {
            let dataDictionary = {};
            
            // 1. Find every checkbox on the page
            let checkboxes = document.querySelectorAll('.assessment-box');
            
            // 2. Loop through them
            checkboxes.forEach(function(box) {
                if (box.checked) {
                    let groupName = box.getAttribute('data-group');
                    let boxValue = box.value;
                    
                    // If the group (e.g., 'cervical') doesn't exist in our dictionary yet, create it as an empty list
                    if (!dataDictionary[groupName]) {
                        dataDictionary[groupName] = [];
                    }
                    
                    // Add the checked bone/joint to that group's list
                    dataDictionary[groupName].push(boxValue);
                }
            });
            
            // 3. Convert the dictionary into a string and shove it into the hidden input before it sends to Django
            document.getElementById('json_payload').value = JSON.stringify(dataDictionary);
        });
    </script>
</body>
</html>
