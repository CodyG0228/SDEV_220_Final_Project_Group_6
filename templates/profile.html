{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 40px; }
        .form-container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { font-weight: bold; display: block; margin-bottom: 5px; color: #333; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { background: #007bff; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.05em; }
        .btn-submit:hover { background: #0056b3; }
        .current-pic-container { text-align: center; margin-bottom: 20px; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #007bff; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 style="margin-top: 0; color: #333; text-align: center;">My Profile</h2>
        
        <div class="current-pic-container">
            {% if profile.profile_picture %}
                <img src="{{ profile.profile_picture.url }}" class="profile-img" alt="Profile Picture">
            {% else %}
                <div style="width: 120px; height: 120px; border-radius: 50%; background: #ccc; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">No Image</div>
            {% endif %}
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            
            <button type="submit" class="btn-submit">Save Profile</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'home' %}" style="color: #666; text-decoration: none;">&larr; Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
