{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EquiSync Home</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #2c3e50;
        }
        
        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: white;
            /* don't have a background yet, not sure if adding one */
            /* linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('{% static "images/hero-bg.jpg" %}') no-repeat center center/cover; */
        }

        .hero-title {
            font-size: 3.5em;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .hero-subtitle {
            font-size: 1.2em;
            margin-bottom: 40px;
            font-weight: 300;
            color: #d1d8e0;
            max-width: 600px;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            gap: 20px;
        }

        .btn-login {
            background-color: #007bff;
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            transition: background-color 0.3s ease;
            border: 2px solid #007bff;
        }

        .btn-login:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        .btn-signup {
            background-color: transparent;
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid white;
        }

        .btn-signup:hover {
            background-color: white;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <h1 class="hero-title">Welcome to EquiSync</h1>
        <p class="hero-subtitle">
            Professional wellness tracking, appointment scheduling, and assessment records for your horses.
        </p>
        
        <div class="button-group">
            <a href="{% url 'login' %}" class="btn-login">Log In to Portal</a>
            <a href="{% url 'about' %}">Learn about the developer of this project</a>
        </div>
    </div>

</body>
</html>
